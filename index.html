<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI  POWERED UNIVERSAL CALCULATOR</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <!-- Mini-COI Fix (Required for GitHub Pages) -->
    <script src="mini-coi.js" scope="./"></script>

    <!-- Config: Fetch your 5 Python files -->
    <script type="py" config>
        {
            "fetch": [
                {
                    "files": [
                        "./Calculator_main.py",
                        "./Grocery_calc.py",
                        "./Interest_calc.py",
                        "./Physics_calc.py",
                        "./Simple_Calculator.py",
                        "./Multiplication_table.py"
                    ]
                }
            ]
        }
    </script>

    <style>
        :root {
            --bg-color: #1e1e1e;
            --terminal-bg: #1e1e1e;
            --accent-color: #007acc;
            --text-color: #cccccc;
            --border-color: #333333;
        }

        /* CENTERING MAGIC: Flexbox */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d; /* Darker background for contrast */
            color: var(--text-color);
            height: 100vh;
            display: flex;             /* Enable Flexbox */
            justify-content: center;   /* Center Horizontally */
            align-items: center;       /* Center Vertically */
            overflow: hidden;
        }

        /* VS Code Full Screen Terminal Dimensions */
        .terminal-wrapper {
            /* 
               To mimic VS Code "Full Screen" editor feel:
               We give it a large fixed size or 90% of screen.
               This makes it look like a focused window.
            */
            width: 90vw;  /* 90% of viewport width */
            height: 85vh; /* 85% of viewport height */
            
            background: var(--terminal-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Deep shadow for floating effect */
            display: flex;
            flex-direction: column;
            border-radius: 8px; /* Slight rounding like modern editors */
            overflow: hidden;
        }

        .terminal-header {
            height: 35px;
            background: #252526;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #969696;
            border-bottom: 1px solid #333;
            user-select: none;
        }

        .terminal-header span {
            margin-right: 1.5rem;
            cursor: pointer;
            padding-bottom: 8px;
        }
        
        .terminal-header span.active {
            color: #ffffff;
            border-bottom: 2px solid var(--accent-color);
        }

        /* PyScript Terminal Styling */
        py-terminal {
            flex: 1;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.5;
            overflow-y: auto;
            color: #cccccc;
            background: transparent;
        }

        /* Loader */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- The Centered Terminal Container -->
    <div class="terminal-wrapper">
        <div class="terminal-header">
            <span class="active">Terminal</span>
            <span style="margin-left: auto; color: #666;">JATH.AI</span>
        </div>
        
        <div id="loader">AI LOADING......</div>
        
        <!-- Terminal Script -->
        <script type="py" src="./Calculator_main.py" terminal worker></script>
    </div>

</body>
</html>
