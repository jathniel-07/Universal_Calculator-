<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI POWERED UNIVERSAL CALCULATOR</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <!-- Mini-COI Fix -->
    <script src="mini-coi.js" scope="./"></script>

    <py-config>
        [[fetch]]
        files = [
            "./Calculator_main.py",
            "./Grocery_calc.py",
            "./Interest_calc.py",
            "./Physics_calc.py",
            "./Simple_calculator.py",
            "./Multiplication_table.py"
        ]
    </py-config>

    <style>
        :root {
            --bg-color: #1e1e1e;
            --terminal-bg: #1e1e1e;
            --accent-color: #007acc;
            --text-color: #cccccc;
            --border-color: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d;
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* TERMINAL CONTAINER - VISIBLE IMMEDIATELY */
        .terminal-wrapper {
            width: 95vw;
            height: 95vh;
            background: var(--terminal-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; /* Changed from none to flex */
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .terminal-header {
            height: 40px;
            background: #252526;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #969696;
            border-bottom: 1px solid #333;
            user-select: none;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-left span.active {
            color: #ffffff;
            border-bottom: 2px solid var(--accent-color);
        }

        py-terminal {
            flex: 1;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: calc(10px + 1.5vmin); 
            line-height: 1.4;
            overflow-y: auto;
            color: #cccccc;
            background: transparent;
            width: 100%;
            box-sizing: border-box;
        }

        /* MOBILE OPTIMIZATIONS */
        @media screen and (max-width: 768px) {
            .terminal-header {
                height: 35px;
                font-size: 0.7rem;
            }

            /* PORTRAIT MODE: Half Height & Centered */
            @media screen and (orientation: portrait) {
                .terminal-wrapper {
                    width: 90vw;
                    height: 50vh; /* Half height */
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%); /* Perfect Center */
                    border-radius: 12px;
                    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
                    border: 1px solid #444;
                }

                py-terminal {
                    font-size: calc(9px + 1.2vmin); 
                    padding: 0.5rem;
                }
            }

            /* LANDSCAPE MODE */
            @media screen and (orientation: landscape) {
                .terminal-wrapper {
                    width: 95vw;
                    height: 85vh;
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                }
                
                py-terminal {
                    font-size: calc(11px + 0.8vmin);
                }
            }
        }
    </style>
</head>
<body>

    <!-- Terminal Container (Visible Immediately) -->
    <div class="terminal-wrapper" id="terminal-container">
        <div class="terminal-header">
            <div class="header-left">
                <span class="active">Terminal</span>
                <span style="color: #666;">JATH.AI</span>
            </div>
            <!-- Start Button Removed for immediate execution -->
        </div>
        
        <script type="py" src="./Calculator_main.py" terminal worker></script>
    </div>

</body>
</html>
