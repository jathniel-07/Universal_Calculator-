<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI POWERED UNIVERSAL CALCULATOR</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <!-- Mini-COI Fix -->
    <script src="mini-coi.js" scope="./"></script>

    <py-config>
        [[fetch]]
        files = [
            "./Calculator_main.py",
            "./Grocery_calc.py",
            "./Interest_calc.py",
            "./Physics_calc.py",
            "./Simple_calculator.py",
            "./Multiplication_table.py"
        ]
    </py-config>

    <style>
        :root {
            --bg-color: #1e1e1e;
            --terminal-bg: #1e1e1e;
            --accent-color: #007acc;
            --text-color: #cccccc;
            --border-color: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d;
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* FULL SCREEN TERMINAL */
        .terminal-wrapper {
            width: 100vw;  /* Changed from 95vw to 100vw */
            height: 100vh; /* Changed from 95vh to 100vh */
            background: var(--terminal-bg);
            border: none;  /* Removed border for full immersion */
            box-shadow: none;
            display: flex;
            flex-direction: column;
            border-radius: 0; /* Removed rounding */
            overflow: hidden;
        }

        .terminal-header {
            height: 35px;
            background: #252526;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #969696;
            border-bottom: 1px solid #333;
            user-select: none;
            flex-shrink: 0;
        }

        .terminal-header span {
            margin-right: 1.5rem;
            cursor: pointer;
            padding-bottom: 8px;
        }
        
        .terminal-header span.active {
            color: #ffffff;
            border-bottom: 2px solid var(--accent-color);
        }

        /* MAXIMIZED TEXT AREA */
        py-terminal {
            flex: 1;
            /* Reduced padding to maximize space */
            padding: 0.5rem; 
            font-family: 'JetBrains Mono', monospace;
            /* Responsive Font Size: Scales with viewport */
            font-size: clamp(12px, 2.5vmin, 18px); 
            line-height: 1.4;
            overflow-y: auto;
            color: #cccccc;
            background: transparent;
            width: 100%;
            box-sizing: border-box;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            pointer-events: none;
            z-index: 10;
        }

        /* ANDROID PORTRAIT OPTIMIZATION */
        @media (max-width: 768px) and (orientation: portrait) {
            .terminal-wrapper {
                width: 100vw;
                height: 100vh;
            }
            
            py-terminal {
                /* Smaller font for narrow screens to fit more width */
                font-size: clamp(10px, 3.5vmin, 14px);
                padding: 0.25rem; /* Minimal padding */
            }
            
            .terminal-header {
                height: 30px;
                font-size: 0.7rem;
                padding: 0 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="terminal-wrapper">
        <div class="terminal-header">
            <span class="active">Terminal</span>
            <span style="margin-left: auto; color: #666;">JATH.AI</span>
        </div>
        
        <script type="py" src="./Calculator_main.py" terminal worker></script>
    </div>

</body>
</html>
